<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradieCatch — Operator Portal</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1923;
      color: #e8edf4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #131e2c;
      border: 1px solid #1f2f42;
      border-radius: 16px;
      padding: 40px 48px;
      width: 100%;
      max-width: 420px;
    }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .logo-box {
      width: 44px;
      height: 44px;
      background: #f4742c;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 15px;
      color: #fff;
    }
    .brand { font-size: 20px; font-weight: 700; color: #e8edf4; }
    .title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #8fa3bc; margin-bottom: 32px; }
    label { display: block; font-size: 13px; color: #8fa3bc; margin-bottom: 6px; font-weight: 500; }
    input {
      width: 100%;
      padding: 12px 14px;
      background: #0f1923;
      border: 1px solid #1f2f42;
      border-radius: 10px;
      color: #e8edf4;
      font-size: 15px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #f4742c; }
    .btn {
      width: 100%;
      padding: 13px;
      background: #f4742c;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      background: rgba(244,74,44,0.12);
      border: 1px solid rgba(244,74,44,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #f4742c;
      margin-bottom: 16px;
    }
  </style>
</head>
<body x-data="loginApp()" x-init="init()">
  <div class="card">
    <div class="logo-row">
      <div class="logo-box">TC</div>
      <span class="brand">TradieCatch</span>
    </div>
    <h1 class="title">Operator Portal</h1>
    <p class="subtitle">Sign in to manage the sales pipeline</p>

    <div x-show="error" class="error" x-text="error"></div>

    <form @submit.prevent="submit">
      <label>Email</label>
      <input type="email" x-model="email" placeholder="operator@tradiecatch.com" autocomplete="email" />

      <label>Password</label>
      <input type="password" x-model="password" placeholder="••••••••" autocomplete="current-password" />

      <button type="submit" class="btn" :disabled="loading">
        <span x-text="loading ? 'Signing in…' : 'Sign In'"></span>
      </button>
    </form>
  </div>

  <script>
    function loginApp() {
      return {
        email: '',
        password: '',
        loading: false,
        error: '',

        init() {
          const tok = localStorage.getItem('operator_token');
          if (tok) window.location.href = '/sales';
        },

        async submit() {
          this.error = '';
          if (!this.email || !this.password) { this.error = 'Email and password are required'; return; }
          this.loading = true;
          try {
            const res = await fetch('/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email: this.email, password: this.password }),
            });
            const data = await res.json();
            if (!res.ok) { this.error = data.error || 'Login failed'; return; }
            if (!data.user?.isOperator) { this.error = 'Access denied: operator account required'; return; }
            localStorage.setItem('operator_token', data.token);
            localStorage.setItem('operator_user', JSON.stringify(data.user));
            window.location.href = '/sales';
          } catch (e) {
            this.error = 'Network error — please try again';
          } finally {
            this.loading = false;
          }
        },
      };
    }
  </script>
</body>
</html>
