<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradieCatch — Sales Pipeline</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1923;
      --card: #131e2c;
      --card2: #192433;
      --border: #1f2f42;
      --text: #e8edf4;
      --muted: #8fa3bc;
      --accent: #f4742c;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

    /* Sidebar */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
    }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; padding: 0 4px; }
    .logo-box { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; color: #fff; flex-shrink: 0; }
    .logo-title { font-size: 15px; font-weight: 700; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      transition: all 0.15s;
      margin-bottom: 4px;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .nav-item.active { background: rgba(244,116,44,0.15); color: var(--accent); }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-footer { margin-top: auto; }
    .user-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; }
    .avatar { width: 32px; height: 32px; background: #2a3f55; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--muted); }
    .user-email { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .logout-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 4px; }
    .logout-btn:hover { color: var(--text); }

    /* Main content */
    .main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .topbar {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .page-title { font-size: 20px; font-weight: 700; }
    .btn { padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost { background: rgba(255,255,255,0.06); color: var(--text); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }

    /* Pipeline board */
    .board-wrap { flex: 1; overflow-x: auto; padding: 20px 24px; }
    .board { display: flex; gap: 16px; height: 100%; min-width: max-content; align-items: flex-start; }
    .column {
      width: 280px;
      min-width: 280px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 140px);
    }
    .col-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .col-name { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
    .col-count { font-size: 12px; background: rgba(255,255,255,0.08); border-radius: 12px; padding: 2px 8px; color: var(--muted); }
    .col-body { padding: 12px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 10px; }

    /* Lead card */
    .lead-card {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .lead-card:hover { border-color: rgba(244,116,44,0.4); transform: translateY(-1px); }
    .lead-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .lead-phone { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .badge-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; }
    .badge-paid { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
    .badge-unpaid { background: rgba(244,116,44,0.1); color: var(--accent); border: 1px solid rgba(244,116,44,0.25); }
    .badge-booked { background: rgba(59,130,246,0.15); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); }
    .lead-time { font-size: 11px; color: var(--muted); margin-top: 6px; }
    .col-empty { text-align: center; color: var(--muted); font-size: 13px; padding: 24px 0; }

    /* Agenda */
    .agenda-wrap { flex: 1; overflow-y: auto; padding: 20px 24px; }
    .agenda-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .agenda-time { font-size: 15px; font-weight: 700; min-width: 80px; }
    .agenda-info { flex: 1; }
    .agenda-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .agenda-phone { font-size: 13px; color: var(--muted); }
    .agenda-empty { text-align: center; color: var(--muted); font-size: 15px; padding: 60px 0; }

    /* Settings */
    .settings-wrap { flex: 1; overflow-y: auto; padding: 20px 24px; max-width: 600px; }
    .settings-group { margin-bottom: 32px; }
    .settings-label { font-size: 13px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
    .settings-input {
      width: 100%;
      padding: 12px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .settings-input:focus { border-color: var(--accent); }
    .settings-hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .settings-saved { color: var(--green); font-size: 13px; font-weight: 500; }

    /* Modal overlay */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 24px;
    }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title { font-size: 17px; font-weight: 700; }
    .close-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; padding: 4px; }
    .close-btn:hover { color: var(--text); }
    .modal-body { padding: 20px 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
    .field input, .field textarea, .field select {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
    .field select option { background: var(--card); }
    .field textarea { resize: vertical; min-height: 80px; }

    /* Lead detail side panel */
    .detail-panel {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: 480px;
      background: var(--card);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 50;
      box-shadow: -8px 0 32px rgba(0,0,0,0.4);
    }
    .panel-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .panel-title { font-size: 17px; font-weight: 700; flex: 1; }
    .panel-body { flex: 1; overflow-y: auto; }
    .panel-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .panel-section-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; margin-bottom: 12px; }
    .detail-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .detail-key { font-size: 13px; color: var(--muted); }
    .detail-val { font-size: 13px; font-weight: 500; text-align: right; max-width: 60%; }
    .stage-select {
      padding: 6px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
    }

    /* SMS thread */
    .thread { padding: 12px 20px; display: flex; flex-direction: column; gap: 8px; }
    .msg { max-width: 75%; padding: 9px 13px; border-radius: 12px; font-size: 13px; line-height: 1.4; }
    .msg-in { background: var(--card2); border: 1px solid var(--border); color: var(--text); align-self: flex-start; border-radius: 4px 12px 12px 12px; }
    .msg-out { background: rgba(244,116,44,0.18); border: 1px solid rgba(244,116,44,0.3); color: var(--text); align-self: flex-end; border-radius: 12px 4px 12px 12px; }
    .msg-time { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .sms-compose { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; }
    .sms-input {
      flex: 1; padding: 9px 12px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 13px; outline: none; font-family: inherit;
      resize: none; min-height: 38px; max-height: 100px;
    }
    .sms-input:focus { border-color: var(--accent); }

    .action-bar { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }

    /* Loading / error */
    .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 15px; }
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 18px;
      font-size: 13px; font-weight: 500;
      z-index: 200;
    }
    .toast-success { border-color: rgba(34,197,94,0.4); color: var(--green); }
    .toast-error { border-color: rgba(239,68,68,0.4); color: var(--red); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a3f55; border-radius: 3px; }
  </style>
</head>
<body x-data="portalApp()" x-init="init()">

  <!-- Loading state -->
  <div class="loading" x-show="appLoading">Loading pipeline…</div>

  <!-- Main app -->
  <template x-if="!appLoading">
    <div style="display:flex;width:100%;height:100vh;overflow:hidden">

      <!-- Sidebar -->
      <div class="sidebar">
        <div class="sidebar-logo">
          <div class="logo-box">TC</div>
          <span class="logo-title">Sales</span>
        </div>

        <button class="nav-item" :class="tab==='pipeline'&&'active'" @click="tab='pipeline'">
          <span class="nav-icon">📋</span> Pipeline
        </button>
        <button class="nav-item" :class="tab==='agenda'&&'active'" @click="tab='agenda'">
          <span class="nav-icon">📅</span> Agenda
          <template x-if="unpaidBooked.length">
            <span style="margin-left:auto;background:rgba(244,116,44,0.2);color:var(--accent);font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px" x-text="unpaidBooked.length"></span>
          </template>
        </button>
        <button class="nav-item" :class="tab==='settings'&&'active'" @click="tab='settings';loadSettings()">
          <span class="nav-icon">⚙️</span> Settings
        </button>

        <div class="sidebar-footer">
          <div class="user-row">
            <div class="avatar" x-text="userInitial"></div>
            <span class="user-email" x-text="userEmail"></span>
            <button class="logout-btn" @click="logout" title="Log out">↗</button>
          </div>
        </div>
      </div>

      <!-- Main content -->
      <div class="main">

        <!-- Pipeline tab -->
        <template x-if="tab==='pipeline'">
          <div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
            <div class="topbar">
              <span class="page-title">Pipeline</span>
              <button class="btn btn-primary" @click="openAddLead()">+ Add Lead</button>
            </div>
            <div class="board-wrap">
              <div class="board">
                <template x-for="col in columns" :key="col.key">
                  <div class="column">
                    <div class="col-header">
                      <span class="col-name" x-text="col.label"></span>
                      <span class="col-count" x-text="leadsInCol(col.key).length"></span>
                    </div>
                    <div class="col-body">
                      <template x-if="leadsInCol(col.key).length===0">
                        <div class="col-empty">No leads</div>
                      </template>
                      <template x-for="lead in leadsInCol(col.key)" :key="lead.id">
                        <div class="lead-card" @click="openLead(lead)">
                          <div class="lead-name" x-text="lead.name||lead.phone"></div>
                          <div class="lead-phone" x-text="lead.phone"></div>
                          <div class="badge-row">
                            <span class="badge" :class="lead.paid?'badge-paid':'badge-unpaid'" x-text="lead.paid?'Paid':'Unpaid'"></span>
                            <span class="badge badge-booked" x-show="lead.calendlyEventTime">Booked</span>
                          </div>
                          <div class="lead-time" x-show="lead.calendlyEventTime" x-text="fmtDateTime(lead.calendlyEventTime)"></div>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </template>

        <!-- Agenda tab -->
        <template x-if="tab==='agenda'">
          <div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
            <div class="topbar">
              <span class="page-title">Upcoming Demos</span>
            </div>
            <div class="agenda-wrap">
              <template x-if="bookedLeads.length===0">
                <div class="agenda-empty">No booked demos yet</div>
              </template>
              <template x-for="lead in bookedLeads" :key="lead.id">
                <div class="agenda-item" @click="openLead(lead)" style="cursor:pointer">
                  <div class="agenda-time" x-text="fmtTime(lead.calendlyEventTime)"></div>
                  <div class="agenda-info">
                    <div class="agenda-name" x-text="lead.name||lead.phone"></div>
                    <div class="agenda-phone" x-text="fmtDate(lead.calendlyEventTime)"></div>
                  </div>
                  <div>
                    <span class="badge" :class="lead.paid?'badge-paid':'badge-unpaid'" x-text="lead.paid?'✓ Paid':'⚠ Unpaid'"></span>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- Settings tab -->
        <template x-if="tab==='settings'">
          <div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
            <div class="topbar">
              <span class="page-title">Settings</span>
              <button class="btn btn-primary" @click="saveSettings()">Save</button>
            </div>
            <div class="settings-wrap">
              <div class="settings-group">
                <div class="settings-label">Demo Video URL</div>
                <input class="settings-input" type="url" x-model="settings.demoVideoUrl" placeholder="https://youtube.com/watch?v=..." />
                <div class="settings-hint">Sent to leads when they reply "DEMO" or "demo"</div>
              </div>
              <div class="settings-group">
                <div class="settings-label">Calendly Booking URL</div>
                <input class="settings-input" type="url" x-model="settings.calendlyUrl" placeholder="https://calendly.com/your-link" />
                <div class="settings-hint">Sent to leads when they reply "YES" or "yes"</div>
              </div>
              <div class="settings-group">
                <div class="settings-label">Setup Fee Amount (AUD)</div>
                <input class="settings-input" type="number" x-model="settings.setupFeeAmount" placeholder="299" />
                <div class="settings-hint">Stripe checkout amount for the setup fee</div>
              </div>
              <div class="settings-group">
                <div class="settings-label">Twilio Phone Number</div>
                <input class="settings-input" type="text" x-model="settings.twilioPhoneNumber" placeholder="+61485037218" readonly style="opacity:0.6;cursor:not-allowed" />
                <div class="settings-hint">The Twilio number used for sales SMS outreach</div>
              </div>
              <div class="settings-group">
                <div class="settings-label">Calendly Webhook URL (for your Calendly account)</div>
                <input class="settings-input" type="text" :value="calendlyWebhookUrl" readonly style="opacity:0.7;cursor:pointer" @click="copyText(calendlyWebhookUrl,'Copied!')" title="Click to copy" />
                <div class="settings-hint">Add this as a webhook in your Calendly dashboard → invitee.created events</div>
              </div>
              <div x-show="settingsSaved" class="settings-saved">✓ Settings saved</div>
            </div>
          </div>
        </template>

      </div><!-- /main -->
    </div>
  </template>

  <!-- Add Lead Modal -->
  <div class="overlay" x-show="showAddLead" @click.self="showAddLead=false">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Add Lead</span>
        <button class="close-btn" @click="showAddLead=false">✕</button>
      </div>
      <div class="modal-body">
        <div class="field"><label>Name</label><input type="text" x-model="newLead.name" placeholder="John Smith" /></div>
        <div class="field"><label>Phone *</label><input type="tel" x-model="newLead.phone" placeholder="+61400000000" /></div>
        <div class="field"><label>Email</label><input type="email" x-model="newLead.email" placeholder="john@example.com" /></div>
        <div class="field"><label>Address</label><input type="text" x-model="newLead.address" placeholder="123 Main St, Sydney NSW" /></div>
        <div class="field"><label>Job Notes</label><textarea x-model="newLead.jobNotes" placeholder="What work is needed?"></textarea></div>
        <div class="field">
          <label>Stage</label>
          <select x-model="newLead.stage">
            <template x-for="col in columns" :key="col.key"><option :value="col.key" x-text="col.label"></option></template>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" @click="showAddLead=false">Cancel</button>
        <button class="btn btn-primary" @click="addLead()" :disabled="savingLead" x-text="savingLead?'Saving…':'Add Lead'"></button>
      </div>
    </div>
  </div>

  <!-- Lead detail panel -->
  <div class="detail-panel" x-show="activeLead" x-cloak>
    <div class="panel-header">
      <button class="close-btn" @click="closeLead()">←</button>
      <span class="panel-title" x-text="activeLead?.name||activeLead?.phone"></span>
      <button class="btn btn-danger btn-sm" @click="deleteLead()">Delete</button>
    </div>

    <div class="panel-body" x-show="activeLead">
      <!-- Info section -->
      <div class="panel-section">
        <div class="panel-section-title">Lead Info</div>
        <div class="detail-row">
          <span class="detail-key">Phone</span>
          <span class="detail-val" x-text="activeLead?.phone"></span>
        </div>
        <div class="detail-row" x-show="activeLead?.email">
          <span class="detail-key">Email</span>
          <span class="detail-val" x-text="activeLead?.email"></span>
        </div>
        <div class="detail-row" x-show="activeLead?.address">
          <span class="detail-key">Address</span>
          <span class="detail-val" x-text="activeLead?.address"></span>
        </div>
        <div class="detail-row">
          <span class="detail-key">Stage</span>
          <select class="stage-select" x-model="activeLead.stage" @change="updateStage(activeLead.stage)">
            <template x-for="col in columns" :key="col.key">
              <option :value="col.key" x-text="col.label"></option>
            </template>
          </select>
        </div>
        <div class="detail-row">
          <span class="detail-key">Paid</span>
          <span class="badge" :class="activeLead?.paid?'badge-paid':'badge-unpaid'" x-text="activeLead?.paid?'Yes':'No'"></span>
        </div>
        <div class="detail-row" x-show="activeLead?.calendlyEventTime">
          <span class="detail-key">Demo Time</span>
          <span class="detail-val" x-text="fmtDateTime(activeLead?.calendlyEventTime)"></span>
        </div>
        <div x-show="activeLead?.jobNotes" style="margin-top:8px">
          <div style="font-size:12px;color:var(--muted);margin-bottom:4px">Notes</div>
          <div style="font-size:13px;color:var(--text);line-height:1.5" x-text="activeLead?.jobNotes"></div>
        </div>
      </div>

      <!-- Actions -->
      <div class="panel-section">
        <div class="panel-section-title">Actions</div>
        <div class="action-bar" style="padding:0;border:0">
          <button class="btn btn-ghost btn-sm" @click="sendIntro()" :disabled="actionLoading">📤 Send Intro SMS</button>
          <button class="btn btn-ghost btn-sm" @click="createPaymentLink()" :disabled="actionLoading" x-show="!activeLead?.paid">💳 Send Payment Link</button>
        </div>
      </div>

      <!-- SMS thread -->
      <div class="panel-section" style="border-bottom:none">
        <div class="panel-section-title">SMS Thread</div>
      </div>
      <div class="thread" x-show="messages.length>0" style="min-height:100px">
        <template x-for="msg in messages" :key="msg.id">
          <div>
            <div class="msg" :class="msg.direction==='out'?'msg-out':'msg-in'" x-text="msg.body"></div>
            <div class="msg-time" style="text-align" :style="msg.direction==='out'?'text-align:right':'text-align:left'" x-text="fmtDateTime(msg.createdAt)"></div>
          </div>
        </template>
      </div>
      <div x-show="messages.length===0" style="padding:16px 20px;color:var(--muted);font-size:13px">No messages yet</div>
    </div>

    <!-- SMS compose -->
    <div class="sms-compose">
      <textarea class="sms-input" x-model="smsText" placeholder="Type a message…" rows="1" @keydown.enter.prevent="sendSms()"></textarea>
      <button class="btn btn-primary btn-sm" @click="sendSms()" :disabled="!smsText.trim()||actionLoading">Send</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" :class="toast.type==='success'?'toast-success':'toast-error'" x-show="toast.show" x-text="toast.msg"></div>

  <script>
    const STAGES = [
      { key: 'new',       label: 'New' },
      { key: 'qualified', label: 'Qualified' },
      { key: 'demo',      label: 'Demo' },
      { key: 'proposal',  label: 'Proposal' },
      { key: 'closed',    label: 'Closed' },
    ];

    function portalApp() {
      return {
        appLoading: true,
        tab: 'pipeline',
        leads: [],
        columns: STAGES,
        activeLead: null,
        messages: [],
        smsText: '',
        actionLoading: false,
        showAddLead: false,
        savingLead: false,
        newLead: { name:'', phone:'', email:'', address:'', jobNotes:'', stage:'new' },
        settings: { demoVideoUrl:'', calendlyUrl:'', setupFeeAmount:299, twilioPhoneNumber:'' },
        settingsSaved: false,
        toast: { show:false, msg:'', type:'success' },
        userEmail: '',
        token: '',

        get userInitial() { return (this.userEmail||'O')[0].toUpperCase(); },
        get bookedLeads() { return this.leads.filter(l=>l.calendlyEventTime).sort((a,b)=>new Date(a.calendlyEventTime)-new Date(b.calendlyEventTime)); },
        get unpaidBooked() { return this.bookedLeads.filter(l=>!l.paid); },
        get calendlyWebhookUrl() { return window.location.origin+'/api/sales/calendly-webhook'; },

        async init() {
          this.token = localStorage.getItem('operator_token')||'';
          const user = JSON.parse(localStorage.getItem('operator_user')||'null');
          if (!this.token || !user) { window.location.href = '/sales-login'; return; }
          this.userEmail = user.email||'';
          await this.loadLeads();
          this.appLoading = false;
        },

        authHeaders() { return { 'Authorization': `Bearer ${this.token}`, 'Content-Type': 'application/json' }; },

        async api(method, path, body) {
          const opts = { method, headers: this.authHeaders() };
          if (body) opts.body = JSON.stringify(body);
          const res = await fetch(path, opts);
          if (res.status===401) { this.logout(); return null; }
          return res;
        },

        async loadLeads() {
          const res = await this.api('GET', '/api/sales/leads');
          if (!res) return;
          this.leads = await res.json();
        },

        leadsInCol(stage) { return this.leads.filter(l=>l.stage===stage); },

        async openLead(lead) {
          this.activeLead = { ...lead };
          this.smsText = '';
          this.messages = [];
          const res = await this.api('GET', `/api/sales/leads/${lead.id}/messages`);
          if (res && res.ok) this.messages = await res.json();
        },

        closeLead() { this.activeLead = null; this.messages = []; },

        async updateStage(stage) {
          const res = await this.api('PATCH', `/api/sales/leads/${this.activeLead.id}`, { stage });
          if (res && res.ok) {
            const updated = await res.json();
            this.activeLead = { ...this.activeLead, ...updated };
            this.leads = this.leads.map(l=>l.id===updated.id?{...l,...updated}:l);
            this.showToast('Stage updated','success');
          }
        },

        async sendIntro() {
          this.actionLoading = true;
          const res = await this.api('POST', `/api/sales/leads/${this.activeLead.id}/send-intro`);
          this.actionLoading = false;
          if (res && res.ok) {
            this.showToast('Intro SMS sent','success');
            await this.reloadMessages();
          } else {
            this.showToast('Failed to send SMS','error');
          }
        },

        async sendSms() {
          if (!this.smsText.trim()) return;
          this.actionLoading = true;
          const res = await this.api('POST', `/api/sales/leads/${this.activeLead.id}/send-sms`, { body: this.smsText });
          this.actionLoading = false;
          if (res && res.ok) {
            this.smsText = '';
            await this.reloadMessages();
          } else {
            this.showToast('Failed to send SMS','error');
          }
        },

        async createPaymentLink() {
          this.actionLoading = true;
          const res = await this.api('POST', `/api/sales/leads/${this.activeLead.id}/create-payment-link`);
          this.actionLoading = false;
          if (res && res.ok) {
            const data = await res.json();
            this.showToast('Payment link sent via SMS','success');
            await this.reloadMessages();
          } else {
            this.showToast('Failed to create payment link','error');
          }
        },

        async reloadMessages() {
          const res = await this.api('GET', `/api/sales/leads/${this.activeLead.id}/messages`);
          if (res && res.ok) this.messages = await res.json();
        },

        async deleteLead() {
          if (!confirm(`Delete lead "${this.activeLead.name||this.activeLead.phone}"?`)) return;
          const res = await this.api('DELETE', `/api/sales/leads/${this.activeLead.id}`);
          if (res && res.ok) {
            this.leads = this.leads.filter(l=>l.id!==this.activeLead.id);
            this.closeLead();
            this.showToast('Lead deleted','success');
          }
        },

        openAddLead() {
          this.newLead = { name:'', phone:'', email:'', address:'', jobNotes:'', stage:'new' };
          this.showAddLead = true;
        },

        async addLead() {
          if (!this.newLead.phone.trim()) { this.showToast('Phone is required','error'); return; }
          this.savingLead = true;
          const res = await this.api('POST', '/api/sales/leads', this.newLead);
          this.savingLead = false;
          if (res && res.ok) {
            const lead = await res.json();
            this.leads.unshift(lead);
            this.showAddLead = false;
            this.showToast('Lead added','success');
          } else {
            this.showToast('Failed to add lead','error');
          }
        },

        async loadSettings() {
          const res = await this.api('GET', '/api/sales/settings');
          if (res && res.ok) this.settings = await res.json();
        },

        async saveSettings() {
          const res = await this.api('PATCH', '/api/sales/settings', this.settings);
          if (res && res.ok) {
            this.settingsSaved = true;
            setTimeout(()=>this.settingsSaved=false, 3000);
          } else {
            this.showToast('Failed to save','error');
          }
        },

        logout() {
          localStorage.removeItem('operator_token');
          localStorage.removeItem('operator_user');
          window.location.href = '/sales-login';
        },

        showToast(msg, type='success') {
          this.toast = { show:true, msg, type };
          setTimeout(()=>this.toast.show=false, 3000);
        },

        copyText(text, msg) {
          navigator.clipboard.writeText(text).then(()=>this.showToast(msg,'success'));
        },

        fmtDateTime(iso) {
          if (!iso) return '';
          const d = new Date(iso);
          return d.toLocaleString('en-AU', { dateStyle:'short', timeStyle:'short' });
        },
        fmtDate(iso) {
          if (!iso) return '';
          return new Date(iso).toLocaleDateString('en-AU', { dateStyle:'medium' });
        },
        fmtTime(iso) {
          if (!iso) return '';
          return new Date(iso).toLocaleTimeString('en-AU', { timeStyle:'short' });
        },
      };
    }
  </script>
</body>
</html>
